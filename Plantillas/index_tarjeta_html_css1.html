<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ── Página ── */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0ede8;
            font-family: 'DM Sans', sans-serif;
        }

        /* ── Tarjeta ── */
        .card {
            background-color: white;          /* fondo blanco */
            border-radius: 12px;              /* bordes redondeados */
            box-shadow:
                0 2px 4px rgba(0,0,0,.06),
                0 8px 24px rgba(0,0,0,.10);   /* sombra externa */
            text-align: center;               /* texto centrado */
            padding: 2.5rem 2rem 2rem;
            width: 280px;
            position: relative;
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 4px 8px rgba(0,0,0,.07),
                0 16px 40px rgba(0,0,0,.13);
        }

        /* Acento decorativo superior */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #c9a96e, #e8c99a);
            border-radius: 12px 12px 0 0;
        }

        /* ── Avatar ── */
        .avatar {
            width: 100px;          /* ancho fijo */
            height: 100px;         /* alto fijo */
            border-radius: 50%;    /* imagen circular */
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #c9a96e;
            margin-bottom: 1rem;
        }

        /* ── Nombre ── */
        .card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: #1a1a1a;
            margin: 0 0 .5rem;
            letter-spacing: .01em;
        }

        /* ── Descripción ── */
        .card p {
            font-size: .9rem;
            color: #6b6b6b;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="avatar" src="https://i.pravatar.cc/100" alt="Avatar">
        <h2>Nombre del Usuario</h2>
        <p>Breve descripción del usuario.</p>
    </div>
</body>
</html>
