<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        /* Centrado total del contenedor en la pantalla */
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .contact-form {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        /* Organización vertical con Flexbox */
        #contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaciado automático entre campos */
        }

        label {
            font-weight: bold;
            font-size: 14px;
            color: #555;
            margin-bottom: -10px; /* Ajuste fino de cercanía al input */
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #4A90E2;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Botón con efecto hover */
        button {
            background-color: #4A90E2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #357ABD;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Estilos para mensajes de validación */
        #form-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none; /* Oculto por defecto */
        }

        .error {
            background-color: #fee2e2;
            color: #dc2626;
            display: block !important;
        }

        .success {
            background-color: #dcfce7;
            color: #16a34a;
            display: block !important;
        }
    </style>
</head>
<body>

    <div class="contact-form">
        <h2>Contact Us</h2>
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Tu nombre completo">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">

            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="¿En qué podemos ayudarte?"></textarea>

            <button type="submit">Submit</button>
        </form>

        <div id="form-message"></div>
    </div>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            // Evitar que el formulario recargue la página
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            const displayMessage = document.getElementById('form-message');

            // Regex simple para validar email
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // Limpiar estados anteriores
            displayMessage.className = '';
            displayMessage.textContent = '';

            // Validación de campos vacíos
            if (name === "" || email === "" || message === "") {
                displayMessage.textContent = "Por favor, rellena todos los campos.";
                displayMessage.classList.add('error');
                return;
            }

            // Validación de formato de email
            if (!emailPattern.test(email)) {
                displayMessage.textContent = "Por favor, introduce un correo electrónico válido.";
                displayMessage.classList.add('error');
                return;
            }

            // Si todo es correcto: Mensaje de éxito
            displayMessage.textContent = "¡Formulario enviado con éxito!";
            displayMessage.classList.add('success');

            // Opcional: Limpiar el formulario tras el éxito
            this.reset();
        });
    </script>
</body>
</html>

<!--
He usado Flexbox para el diseño y una lógica de JavaScript que intercepta el envío para que la página no se recargue.

Detalles clave de la implementación:
Flexbox en el Formulario: Al usar display: flex y flex-direction: column en el #contact-form, los elementos se apilan verticalmente de forma limpia. El gap: 15px evita tener que poner márgenes manuales a cada elemento.

Validación Robusta: Aunque HTML5 tiene validación nativa (como required), el ejercicio pedía validación con JS. He añadido un regex para asegurar que el email tenga un formato @ real y un chequeo de campos vacíos mediante .trim() (para evitar que el usuario envíe solo espacios en blanco).

Feedback Visual: El botón tiene una pequeña transición de color y un efecto de "hundimiento" (transform: scale(0.98)) al hacer clic, lo que le da una sensación muy profesional.
-->
